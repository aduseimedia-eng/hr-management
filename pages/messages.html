<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — HRConnect</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/workspace.css">
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      height: calc(100vh - var(--topbar-h) - 56px);
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .inbox-panel {
      border-right: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .inbox-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inbox-search { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .inbox-list   { flex: 1; overflow-y: auto; }
    .inbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background var(--duration);
      position: relative;
    }
    .inbox-item:hover { background: var(--bg-page); }
    .inbox-item.active { background: var(--navy-50); }
    .inbox-item.unread { background: var(--navy-50); }
    .inbox-item.unread .inbox-name { font-weight: 600; }
    .inbox-info { flex: 1; min-width: 0; }
    .inbox-name { font-size: .875rem; font-weight: 500; }
    .inbox-preview { font-size: .78rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .inbox-meta  { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
    .inbox-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber-500); flex-shrink: 0; }

    .chat-panel {
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-surface);
    }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); flex-direction: column; gap: 12px; }
    .chat-empty svg { width: 48px; height: 48px; opacity: .25; }
    .msg-bubble {
      display: flex;
      gap: 10px;
      max-width: 70%;
    }
    .msg-bubble.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-text {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: .875rem;
      line-height: 1.5;
    }
    .msg-bubble:not(.mine) .msg-text { background: var(--bg-page); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .msg-bubble.mine      .msg-text { background: var(--navy-800); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: .72rem; color: var(--text-muted); margin-top: 4px; text-align: right; }
    .msg-bubble:not(.mine) .msg-time { text-align: left; }

    .chat-input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input-area textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      border-radius: var(--radius-md);
    }

    .new-msg-btn {
      width: 100%;
      margin-top: 8px;
      justify-content: center;
    }

    @media (max-width: 768px) {
      .messages-layout { grid-template-columns: 1fr; }
      .chat-panel { display: none; }
      .chat-panel.mobile-open { display: flex; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar">
    <div class="topbar-title">Messages</div>
    <div class="topbar-actions">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="dot hidden" id="notif-badge"></span>
      </button>
    </div>
  </header>
  <main class="main-content" style="padding:28px;display:flex;flex-direction:column">
    <div class="messages-layout">
      <!-- Inbox -->
      <div class="inbox-panel">
        <div class="inbox-header">
          <strong style="font-family:var(--font-display)">Inbox</strong>
          <button class="btn btn-accent btn-sm" onclick="showNewMsgModal()">+ New</button>
        </div>
        <div class="inbox-search">
          <input type="text" class="form-control" placeholder="Search conversations…" id="inbox-search" oninput="filterInbox(this.value)">
        </div>
        <div class="inbox-list" id="inbox-list">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Chat panel -->
      <div class="chat-panel" id="chat-panel">
        <div class="chat-empty" id="chat-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <p>Select a conversation to start messaging</p>
        </div>
        <div id="chat-active" style="display:none;flex-direction:column;height:100%">
          <div class="chat-header" id="chat-header"></div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-area">
            <textarea id="msg-input" class="form-control" placeholder="Type a message…" rows="1" onkeydown="handleMsgKey(event)"></textarea>
            <button class="btn btn-primary" onclick="sendMessage()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- New Message Modal -->
<div id="new-msg-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>New Message</h3>
      <button class="modal-close" onclick="document.getElementById('new-msg-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label required">To</label>
        <select id="new-msg-to" class="form-control form-select"><option value="">— Select recipient —</option></select>
      </div>
      <div class="form-group">
        <label class="form-label required">Message</label>
        <textarea id="new-msg-body" class="form-control" rows="4" placeholder="Write your message…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('new-msg-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="sendNewMessage()">Send</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const user = requireAuth();
if (!user) throw new Error('redirect');
buildSidebar('messages');
loadNotifCount();

let allConversations = [];
let activePerson = null;
let pollInterval = null;
let directoryEmployees = [];

async function loadInbox() {
  allConversations = await api.get('/messages/inbox');
  renderInbox(allConversations);
}

function renderInbox(convos) {
  const list = document.getElementById('inbox-list');
  if (!convos.length) {
    list.innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:.875rem">No conversations yet</div>`;
    return;
  }
  list.innerHTML = convos.map(c => `
    <div class="inbox-item ${c.unread_count > 0 ? 'unread' : ''} ${activePerson?.id === c.id ? 'active' : ''}"
         onclick="openConversation(${c.id}, '${c.first_name} ${c.last_name}', '${c.photo_url || ''}', '${c.job_title || ''}', this)">
      ${c.photo_url
        ? `<img src="${assetUrl(c.photo_url)}" class="avatar avatar-sm" alt="">`
        : initialsAvatar(c.first_name, c.last_name, 'sm')}
      <div class="inbox-info">
        <div class="inbox-name">${c.first_name} ${c.last_name}</div>
        <div class="inbox-preview">${c.last_message || 'Start a conversation'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="inbox-meta">${c.last_msg_time ? fmt.relativeTime(c.last_msg_time) : ''}</div>
        ${c.unread_count > 0 ? `<div class="inbox-unread-dot"></div>` : ''}
      </div>
    </div>`).join('');
}

function filterInbox(query) {
  const filtered = allConversations.filter(c =>
    `${c.first_name} ${c.last_name}`.toLowerCase().includes(query.toLowerCase())
  );
  renderInbox(filtered);
}

async function openConversation(personId, name, photoUrl, title, sourceEl = null) {
  activePerson = { id: personId, name, photoUrl, title };

  // Update active state in inbox
  document.querySelectorAll('.inbox-item').forEach(el => el.classList.remove('active'));
  if (sourceEl) {
    sourceEl.classList.add('active');
    sourceEl.classList.remove('unread');
    sourceEl.querySelector('.inbox-unread-dot')?.remove();
  }

  // Show chat panel
  document.getElementById('chat-empty').style.display = 'none';
  const chatActive = document.getElementById('chat-active');
  chatActive.style.display = 'flex';

  // Set header
  document.getElementById('chat-header').innerHTML = `
    ${photoUrl ? `<img src="${assetUrl(photoUrl)}" class="avatar avatar-sm" alt="">` : initialsAvatar(name.split(' ')[0], name.split(' ')[1], 'sm')}
    <div>
      <div style="font-weight:600;font-size:.9rem">${name}</div>
      <div style="font-size:.78rem;color:var(--text-muted)">${title}</div>
    </div>`;

  await loadMessages();

  // Poll for new messages
  clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 5000);
}

async function loadMessages() {
  if (!activePerson) return;
  const msgs = await api.get(`/messages/conversation/${activePerson.id}`);
  const container = document.getElementById('chat-messages');
  container.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === user.id;
    return `<div class="msg-bubble ${isMine ? 'mine' : ''}">
      ${!isMine ? (activePerson.photoUrl
        ? `<img src="${assetUrl(activePerson.photoUrl)}" class="avatar avatar-sm" alt="">`
        : initialsAvatar(activePerson.name.split(' ')[0], activePerson.name.split(' ')[1], 'sm')) : ''}
      <div>
        <div class="msg-text">${escapeHtml(m.body)}</div>
        <div class="msg-time">${fmt.time(m.sent_at)}</div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;

  // Refresh inbox
  allConversations = await api.get('/messages/inbox');
  renderInbox(allConversations);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const body = input.value.trim();
  if (!body || !activePerson) return;
  input.value = '';
  try {
    await api.post('/messages', { receiver_id: activePerson.id, body });
    await loadMessages();
  } catch(e) { toast(e.message, 'error'); }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function showNewMsgModal() {
  // Load all employees for recipient select
  const sel = document.getElementById('new-msg-to');
  sel.innerHTML = '<option value="">— Select recipient —</option>';
  try {
    directoryEmployees = await api.get('/employees/directory');
    directoryEmployees.forEach(e => {
      if (e.id !== user.id) {
        sel.innerHTML += `<option value="${e.id}">${e.first_name} ${e.last_name} (${e.job_title || e.role})</option>`;
      }
    });
  } catch(e) { /* silent */ }
  document.getElementById('new-msg-modal').style.display = 'flex';
}

async function sendNewMessage() {
  const to   = document.getElementById('new-msg-to').value;
  const body = document.getElementById('new-msg-body').value.trim();
  if (!to || !body) { toast('Select a recipient and write a message', 'warning'); return; }
  try {
    await api.post('/messages', { receiver_id: parseInt(to), body });
    document.getElementById('new-msg-modal').style.display = 'none';
    document.getElementById('new-msg-body').value = '';
    toast('Message sent!', 'success');
    await loadInbox();
    // Open the new conversation
    const recipient = directoryEmployees.find(e => e.id === parseInt(to));
    if (recipient) {
      openConversation(recipient.id, `${recipient.first_name} ${recipient.last_name}`, recipient.photo_url, recipient.job_title);
    }
  } catch(e) { toast(e.message, 'error'); }
}

loadInbox();
</script>
</body>
</html>
