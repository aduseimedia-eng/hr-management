<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — HRConnect</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .doc-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all var(--duration);
    }
    .doc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .doc-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }
    .doc-icon.pdf      { background: var(--rose-100);   color: var(--rose-600); }
    .doc-icon.image    { background: var(--violet-100); color: var(--violet-600); }
    .doc-icon.word     { background: var(--info-bg);    color: var(--info-fg); }
    .doc-icon.other    { background: var(--bg-page);    color: var(--text-muted); }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: .78rem; color: var(--text-muted); margin-top: 3px; }
    .doc-actions { display: flex; gap: 8px; }

    .upload-zone {
      border: 2px dashed var(--border-dark);
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all var(--duration);
      background: var(--bg-page);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--navy-400);
      background: var(--navy-50);
    }
    .upload-zone svg { width: 36px; height: 36px; color: var(--text-muted); margin: 0 auto 12px; }
    .upload-zone p   { color: var(--text-muted); font-size: .9rem; }
    .upload-zone strong { color: var(--navy-700); }

    .docs-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar">
    <div class="topbar-title">Documents</div>
    <div class="topbar-actions">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="dot hidden" id="notif-badge"></span>
      </button>
    </div>
  </header>
  <main class="main-content">
    <div class="page-header">
      <div><h1>Documents</h1><p>Upload and manage your HR documents</p></div>
      <button class="btn btn-primary" onclick="document.getElementById('upload-modal').style.display='flex'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload Document
      </button>
    </div>

    <!-- Drag-drop upload zone -->
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p><strong>Click to upload</strong> or drag and drop files here</p>
      <p style="font-size:.8rem;margin-top:4px">PDF, Word, JPG, PNG up to 20MB</p>
      <input type="file" id="file-input" style="display:none" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onchange="quickUpload(this.files[0])">
    </div>

    <div style="margin-top:24px">
      <h3 style="margin-bottom:16px">My Documents</h3>
      <div class="docs-grid" id="docs-grid">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Upload Document</h3>
      <button class="modal-close" onclick="document.getElementById('upload-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label required">Document Type</label>
        <select id="doc-type" class="form-control form-select">
          <option value="contract">Contract</option>
          <option value="certificate">Certificate</option>
          <option value="id">ID Document</option>
          <option value="offer_letter">Offer Letter</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label required">File</label>
        <input type="file" id="doc-file" class="form-control" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
        <div class="form-hint">PDF, Word, JPG or PNG — max 20MB</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('upload-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="uploadDocument()">Upload</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const user = requireAuth();
if (!user) throw new Error('redirect');
buildSidebar('documents');
loadNotifCount();

function docIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  if (ext === 'pdf') return { cls: 'pdf', icon: '📄' };
  if (['jpg','jpeg','png','webp'].includes(ext)) return { cls: 'image', icon: '🖼️' };
  if (['doc','docx'].includes(ext)) return { cls: 'word', icon: '📝' };
  return { cls: 'other', icon: '📎' };
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1048576) return `${(bytes/1024).toFixed(1)} KB`;
  return `${(bytes/1048576).toFixed(1)} MB`;
}

async function loadDocs() {
  const docs = await api.get('/documents/mine');
  const grid = document.getElementById('docs-grid');
  if (!docs.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <h4>No documents yet</h4>
        <p>Upload your first document using the button above</p>
      </div>`;
    return;
  }
  grid.innerHTML = docs.map(d => {
    const { cls, icon } = docIcon(d.original_name);
    return `<div class="doc-card">
      <div class="doc-icon ${cls}">${icon}</div>
      <div class="doc-info">
        <div class="doc-name">${d.original_name}</div>
        <div class="doc-meta">
          <span class="badge badge-info">${d.doc_type}</span>
          ${d.file_size ? `<span style="margin-left:8px">${formatSize(d.file_size)}</span>` : ''}
          <span style="margin-left:8px">${fmt.date(d.uploaded_at)}</span>
        </div>
      </div>
      <div class="doc-actions">
        <a href="${assetUrl(d.file_path)}" target="_blank" class="btn btn-outline btn-sm">View</a>
        <button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id}, this)">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function uploadDocument() {
  const file = document.getElementById('doc-file').files[0];
  const type = document.getElementById('doc-type').value;
  if (!file) { toast('Please select a file', 'warning'); return; }
  try {
    const form = new FormData();
    form.append('document', file);
    form.append('doc_type', type);
    await api.upload('/documents', form);
    document.getElementById('upload-modal').style.display = 'none';
    toast('Document uploaded!', 'success');
    loadDocs();
  } catch(e) { toast(e.message, 'error'); }
}

async function quickUpload(file) {
  if (!file) return;
  const type = prompt('Document type? (contract / certificate / id / offer_letter / other)', 'other');
  if (!type) return;
  try {
    const form = new FormData();
    form.append('document', file);
    form.append('doc_type', type);
    await api.upload('/documents', form);
    toast('Document uploaded!', 'success');
    loadDocs();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteDoc(id, btn) {
  if (!confirm('Delete this document? This cannot be undone.')) return;
  try {
    await api.delete(`/documents/${id}`);
    toast('Document deleted', 'success');
    loadDocs();
  } catch(e) { toast(e.message, 'error'); }
}

// Drag & drop
function handleDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function handleDragLeave(e) { document.getElementById('drop-zone').classList.remove('drag-over'); }
function handleDrop(e)      { e.preventDefault(); handleDragLeave(); const file = e.dataTransfer.files[0]; if (file) quickUpload(file); }

loadDocs();
</script>
</body>
</html>
