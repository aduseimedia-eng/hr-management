<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Management — HRConnect</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/workspace.css">
  <style>
    .leave-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .leave-type-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      text-align: center;
    }
    .leave-type-card .days { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--navy-800); }
    .leave-type-card .label { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-header { font-size: .75rem; font-weight: 600; text-align: center; padding: 6px; color: var(--text-muted); text-transform: uppercase; }
    .cal-day {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      cursor: default;
      position: relative;
    }
    .cal-day.other-month { color: var(--text-muted); opacity: .4; }
    .cal-day.today { background: var(--navy-800); color: #fff; font-weight: 600; }
    .cal-day.on-leave { background: var(--amber-100); color: var(--amber-600); font-weight: 500; }
    .cal-day.on-leave.today { background: var(--amber-500); color: var(--navy-950); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav h4 { font-size: 1rem; }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <header class="topbar">
    <div class="topbar-title">Leave Management</div>
    <div class="topbar-actions">
      <button class="icon-btn" id="notif-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="dot hidden" id="notif-badge"></span>
      </button>
    </div>
  </header>
  <main class="main-content">
    <div class="page-header">
      <div><h1>Leave Management</h1><p>Request, track, and manage leave</p></div>
      <button class="btn btn-primary" onclick="showRequestModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Request Leave
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('my')">My Leave</button>
      <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
      <button class="tab-btn" id="hr-tab" style="display:none" onclick="switchTab('all')">All Requests</button>
    </div>

    <!-- My Leave -->
    <div id="tab-my">
      <div class="table-container">
        <table>
          <thead><tr><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Status</th><th>Applied</th></tr></thead>
          <tbody id="my-leave-tbody"><tr><td colspan="7"><div class="loading-state"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Calendar -->
    <div id="tab-calendar" style="display:none">
      <div class="card">
        <div class="card-header">
          <div class="cal-nav" style="width:100%">
            <button class="btn btn-outline btn-sm" onclick="prevMonth()">&#8592;</button>
            <h4 id="cal-title"></h4>
            <button class="btn btn-outline btn-sm" onclick="nextMonth()">&#8594;</button>
          </div>
        </div>
        <div class="card-body">
          <div class="calendar-grid" id="cal-grid"></div>
          <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap" id="cal-legend"></div>
        </div>
      </div>
    </div>

    <!-- All requests (HR) -->
    <div id="tab-all" style="display:none">
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <select id="hr-status-filter" class="form-control form-select" style="max-width:160px" onchange="loadAllLeaves()">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="all-leave-tbody"><tr><td colspan="7"><div class="loading-state"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Request Leave Modal -->
<div id="req-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Request Leave</h3>
      <button class="modal-close" onclick="document.getElementById('req-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label required">Leave Type</label>
        <select id="req-type" class="form-control form-select">
          <option value="annual">Annual Leave</option>
          <option value="sick">Sick Leave</option>
          <option value="maternity">Maternity Leave</option>
          <option value="paternity">Paternity Leave</option>
          <option value="unpaid">Unpaid Leave</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label required">Start Date</label>
          <input type="date" id="req-start" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label required">End Date</label>
          <input type="date" id="req-end" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reason</label>
        <textarea id="req-reason" class="form-control" rows="3" placeholder="Optional: briefly describe the reason"></textarea>
      </div>
      <div id="req-days-preview" style="font-size:.875rem;color:var(--text-muted)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('req-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="submitRequest()">Submit Request</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const user = requireAuth();
if (!user) throw new Error('redirect');
buildSidebar('leave');
loadNotifCount();

if (['admin','manager'].includes(user.role)) {
  document.getElementById('hr-tab').style.display = '';
}

function switchTab(tab) {
  ['my','calendar','all'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['my','calendar','all'][i] === tab);
  });
  if (tab === 'calendar') renderCalendar();
  if (tab === 'all') loadAllLeaves();
}

// My leave history
async function loadMyLeaves() {
  const rows = await api.get('/leave/mine');
  const tbody = document.getElementById('my-leave-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>No leave requests yet</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const days = Math.ceil((new Date(r.end_date) - new Date(r.start_date)) / 86400000) + 1;
    return `<tr>
      <td><span class="badge badge-info">${r.leave_type}</span></td>
      <td>${fmt.date(r.start_date)}</td>
      <td>${fmt.date(r.end_date)}</td>
      <td>${days}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.reason || '—'}</td>
      <td>${fmt.statusBadge(r.status)}</td>
      <td>${fmt.date(r.created_at)}</td>
    </tr>`;
  }).join('');
}

// All leave (HR)
async function loadAllLeaves() {
  const status = document.getElementById('hr-status-filter')?.value || '';
  let qs = status ? `?status=${status}` : '';
  const rows = await api.get(`/leave${qs}`);
  const tbody = document.getElementById('all-leave-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>No requests found</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const days = Math.ceil((new Date(r.end_date) - new Date(r.start_date)) / 86400000) + 1;
    const actions = r.status === 'pending' ? `
      <button class="btn btn-success btn-sm" onclick="updateLeave(${r.id},'approved')">Approve</button>
      <button class="btn btn-danger btn-sm" onclick="updateLeave(${r.id},'rejected')">Reject</button>
    ` : `<span class="text-muted text-sm">${r.approver_name ? `By ${r.approver_name}` : '—'}</span>`;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${initialsAvatar(r.employee_name?.split(' ')[0]||'?',r.employee_name?.split(' ')[1]||'','sm')}<span style="font-weight:500">${r.employee_name}</span></div></td>
      <td><span class="badge badge-info">${r.leave_type}</span></td>
      <td>${fmt.date(r.start_date)}</td>
      <td>${fmt.date(r.end_date)}</td>
      <td>${days}</td>
      <td>${fmt.statusBadge(r.status)}</td>
      <td style="display:flex;gap:6px">${actions}</td>
    </tr>`;
  }).join('');
}

async function updateLeave(id, status) {
  try {
    await api.patch(`/leave/${id}/status`, { status });
    toast(`Leave ${status}`, 'success');
    loadAllLeaves();
  } catch(e) { toast(e.message, 'error'); }
}

// Calendar
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

async function renderCalendar() {
  const leaves = await api.get(`/leave/calendar?year=${calYear}&month=${calMonth + 1}`);

  // Build set of leave dates
  const leaveDates = {};
  leaves.forEach(l => {
    let d = new Date(l.start_date);
    const end = new Date(l.end_date);
    while (d <= end) {
      const key = d.toISOString().split('T')[0];
      if (!leaveDates[key]) leaveDates[key] = [];
      leaveDates[key].push(l.employee_name);
      d.setDate(d.getDate() + 1);
    }
  });

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${monthNames[calMonth]} ${calYear}`;

  const grid = document.getElementById('cal-grid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d => `<div class="cal-header">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];

  // Empty cells before month starts
  for (let i = 0; i < first; i++) html += `<div class="cal-day other-month"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const onLeave = leaveDates[dateStr];
    const cls = `cal-day${isToday?' today':''}${onLeave?' on-leave':''}`;
    const title = onLeave ? `title="${onLeave.join(', ')} on leave"` : '';
    html += `<div class="${cls}" ${title}>${d}</div>`;
  }

  grid.innerHTML = html;

  // Legend
  const legend = document.getElementById('cal-legend');
  legend.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;font-size:.8rem">
      <div style="width:14px;height:14px;border-radius:3px;background:var(--navy-800)"></div> Today
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:.8rem">
      <div style="width:14px;height:14px;border-radius:3px;background:var(--amber-100)"></div> On Leave
    </div>
  `;
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function showRequestModal() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('req-start').value = today;
  document.getElementById('req-end').value = today;
  document.getElementById('req-modal').style.display = 'flex';
}

// Days preview
['req-start','req-end'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const s = document.getElementById('req-start').value;
    const e = document.getElementById('req-end').value;
    if (s && e) {
      const days = Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1;
      document.getElementById('req-days-preview').textContent = days > 0 ? `Duration: ${days} day(s)` : 'End date must be after start date';
    }
  });
});

async function submitRequest() {
  try {
    await api.post('/leave', {
      leave_type: document.getElementById('req-type').value,
      start_date: document.getElementById('req-start').value,
      end_date:   document.getElementById('req-end').value,
      reason:     document.getElementById('req-reason').value,
    });
    document.getElementById('req-modal').style.display = 'none';
    toast('Leave request submitted!', 'success');
    loadMyLeaves();
  } catch(e) { toast(e.message, 'error'); }
}

loadMyLeaves();
</script>
</body>
</html>
